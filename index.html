<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="src/output.css" rel="stylesheet">

</head>

<body class="h-screen flex items-center justify-center text-cyan-900" id="body">

    <div class="w-full max-w-[90%] lg:max-w-3xl p-4 md:p-9 mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

            <!-- Joke Container -->
            <section
                class="md:col-span-2 md:row-span-2 p-5 flex flex-col items-center justify-center group backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg ">
                <p class="text-xl font-medium" id="joke-display__text">
                </p>

                <div id="score-container" class="invisible group-hover:visible">
                    <form class="score-container_form" id="scoring-form">
                        <input type="radio" id="score1" name="score" value="3" class="tab-score" />
                        <label for="score1">★</label>

                        <input type="radio" id="score2" name="score" value="2" class="tab-score" />
                        <label for="score2">★</label>

                        <input type="radio" id="score3" name="score" value="1" class="tab-score" />
                        <label for="score3">★</label>
                    </form>

                </div>








            </section>


            <!-- Meme Container -->
            <section
                class="md:col-span-2 md:row-span-2 p-3 h-full backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg">
                <p class="font-medium text-sm mb-2">Meme of the day</p>
                <img id="memeOftheDay" src="/src/assets/memes/meme-10.gif" class="rounded-lg w-full">

            </section>

            <!-- Weather container -->

            <section
                class="md:col-span-3 md:row-span-1  p-3 backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg">
                <p class="text-sm font-medium mb-2">Today's weather</p>
                <div class="flex">
                    <article
                        class="backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg p-4 max-w-fit ml-2 mr-2">

                        <h3 class="">Feels like</h3>
                        <p id="weather__feels-like_p" class="text-2xl"></p>
                    </article>

                    <article
                        class="backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg p-4 max-w-fit ml-2 mr-2">
                        <h3>Temperature</h3>
                        <p id="weather__temperature_p" class="text-2xl"></p>
                    </article>
                    <article
                        class="backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg p-4 max-w-fit ml-2 mr-2">
                        <h3>Rain</h3>
                        <p id="weather__rain_p" class="text-2xl"></p>
                    </article>
                    <article
                        class="backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg p-4 max-w-fit ml-2 mr-2">
                        <h3>Wind Speed</h3>
                        <p id="weather__wind-speed_p" class="text-2xl"></p>
                    </article>



                </div>

            </section>

            <!-- Next Joke container -->

            <section
                class="md:col-span-1 md:row-span-1  p-3 flex items-center justify-center backdrop-blur-md bg-white/30 border border-white/20 rounded-xl shadow-lg ">
                <button class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 px-4 rounded cursor-pointer"
                    id="joke-display__button">Next
                    Joke</button>
            </section>

        </div>




    </div>

    <script src="dist/app-bundle.js"></script>
</body>

</html>
